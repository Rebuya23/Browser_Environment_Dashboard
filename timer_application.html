<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Timer App</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #4facfe, #00f2fe);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}

.container {
    background: white;
    padding: 30px;
    border-radius: 15px;
    text-align: center;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    width: 320px;
}

h1 {
    margin-bottom: 20px;
}

#timer {
    font-size: 40px;
    font-weight: bold;
    margin: 20px 0;
    letter-spacing: 2px;
}

#status {
    font-size: 16px;
    margin-bottom: 20px;
    color: #555;
}

.buttons button {
    padding: 10px 15px;
    margin: 5px;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    cursor: pointer;
    transition: 0.3s;
}

#startBtn {
    background-color: #8bfa5f;
    color: rgb(0, 0, 0);
}

#pauseBtn {
    background-color: #ecf842;
    color: rgb(0, 0, 0);
}

#resetBtn {
    background-color: #f03d3d;
    color: rgb(0, 0, 0);
}

.buttons button:hover {
    transform: scale(1.08);
    opacity: 0.9;
}

#startBtn:hover {
    background-color: #33ff00; 
}

#pauseBtn:hover {
    background-color: #fffb00f8; 
}

#resetBtn:hover {
    background-color: #ff0000; 
}

@media (max-width: 600px) {
    .container {
        width: 90%;
        padding: 20px;
    }

    #timer {
        font-size: 32px;
    }

    .buttons button {
        width: 100%;
        margin: 5px 0;
        font-size: 16px;
    }
}
</style>
</head>

<body>

<div class="container">
    <h1>⏱ Timer Application</h1>

    <div id="timer">00:00:00:00</div>

    <p id="status">Status: Reset</p>

    <div class="buttons">
        <button id="startBtn">Start</button>
        <button id="pauseBtn">Pause</button>
        <button id="resetBtn">Reset</button>
    </div>
</div>

<script>
let timer;
let milliseconds = 0;
let isRunning = false;

const timerDisplay = document.getElementById("timer");
const statusDisplay = document.getElementById("status");
const startBtn = document.getElementById("startBtn");
const pauseBtn = document.getElementById("pauseBtn");
const resetBtn = document.getElementById("resetBtn");

const startSound = new Audio("https://www.soundjay.com/buttons/sounds/button-09.mp3");
const pauseSound = new Audio("https://www.soundjay.com/buttons/sounds/button-10.mp3");
const resetSound = new Audio("https://www.soundjay.com/buttons/sounds/button-11.mp3");

function playSound(sound) {
    sound.currentTime = 0;
    sound.play().catch(function(){});
}

function formatTime(ms) {
    let totalSeconds = Math.floor(ms / 1000);

    let hrs = Math.floor(totalSeconds / 3600);
    let mins = Math.floor((totalSeconds % 3600) / 60);
    let secs = totalSeconds % 60;

    let milli = Math.floor((ms % 1000) / 10);

    return (
        String(hrs).padStart(2, '0') + ":" +
        String(mins).padStart(2, '0') + ":" +
        String(secs).padStart(2, '0') + ":" +
        String(milli).padStart(2, '0')
    );
}

function updateDisplay() {
    timerDisplay.textContent = formatTime(milliseconds);
}

startBtn.addEventListener("click", function () {
    if (!isRunning) {
        timer = setInterval(function () {
            milliseconds += 10;
            updateDisplay();
        }, 10);

        isRunning = true;
        statusDisplay.textContent = "Status: Running";

        playSound(startSound);
    }
});

pauseBtn.addEventListener("click", function () {
    clearInterval(timer);
    isRunning = false;
    statusDisplay.textContent = "Status: Paused";

    playSound(pauseSound);
});

resetBtn.addEventListener("click", function () {
    clearInterval(timer);
    milliseconds = 0;
    updateDisplay();
    isRunning = false;
    statusDisplay.textContent = "Status: Reset";

    playSound(resetSound);
});

document.addEventListener("keydown", function (event) {
    if (event.key.toLowerCase() === 's') startBtn.click();
    if (event.key.toLowerCase() === 'p') pauseBtn.click();
    if (event.key.toLowerCase() === 'r') resetBtn.click();
});
</script>

</body>
</html>
