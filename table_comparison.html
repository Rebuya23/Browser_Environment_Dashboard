<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Product Table Comparison</title>

<style>
body {
    font-family: Arial;
    background: linear-gradient(to right, #111827, #374151);
}

.container {
    width: 80%;
    margin: 40px auto;
    background: white;
    padding: 20px;
    border-radius: 10px;
    text-align: center;
}

input {
    padding: 8px;
    margin: 5px;
}

button {
    padding: 8px 12px;
    margin: 5px;
    background: #22d3ee;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}
 button:hover {
    background: #A78BFA;
    transform: scale(1.05);
}
table {
    width: 100%;
    margin-top: 20px;
    border-collapse: collapse;
}

th, td {
    border: 1px solid #ddd;
    padding: 10px;
}

th {
    background: #374151;
    color: white;
}

#methodUsed {
    font-weight: bold;
    margin-top: 10px;
}
</style>

</head>

<body>

<div class="container">

<h2>🛒 Product Table Comparison</h2>

<input type="text" id="name" placeholder="Product Name">
<input type="number" id="price" placeholder="Price">
<input type="text" id="category" placeholder="Category">

<br>

<button onclick="addInnerHTML()">Add (innerHTML)</button>
<button onclick="addDOM()">Add (DOM)</button>

<br><br>

<button onclick="loadInnerHTML()">Load Using (innerHTML)</button>
<button onclick="loadDOM()">Load Using (DOM Methods)</button>

<br><br>

<button onclick="testPerformance()">Performance Test</button>

<button onclick="clearTable()">Clear</button>

<p id="methodUsed"></p>

<table>
<thead>
<tr>
<th>Product Name</th>
<th>Price</th>
<th>Category</th>
<th>Action</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>
</table>

</div>

<script>

const sampleProducts = [
    { name: "T-shirt", price: 299, category: "Clothing" },
    { name: "Shorts", price: 249, category: "Clothing" },
    { name: "Cap", price: 150, category: "Clothing" },
    { name: "Socks", price: 50, category: "Clothing" },
    { name: "Hoodie Jacket", price: 350, category: "Clothing" }
];

function generateProduct(i) {
    return {
        name: "Product " + i,
        price: i * 10,
        category: "Category " + (i % 5)
    };
}

function loadInnerHTML() {
    const tbody = document.getElementById("tableBody");
    let rows = "";

    sampleProducts.forEach(p => {
        rows += `
        <tr>
            <td>${p.name}</td>
            <td>${p.price}</td>
            <td>${p.category}</td>
            <td><button onclick="this.parentElement.parentElement.remove()">Delete</button></td>
        </tr>`;
    });

    tbody.innerHTML = rows;
    document.getElementById("methodUsed").innerText = "Method Used: innerHTML";
}

function loadDOM() {
    const tbody = document.getElementById("tableBody");
    tbody.innerHTML = "";

    sampleProducts.forEach(p => {
        const row = document.createElement("tr");

        const td1 = document.createElement("td");
        const td2 = document.createElement("td");
        const td3 = document.createElement("td");
        const td4 = document.createElement("td");

        td1.textContent = p.name;
        td2.textContent = p.price;
        td3.textContent = p.category;

        const btn = document.createElement("button");
        btn.textContent = "Delete";
        btn.onclick = () => row.remove();

        td4.appendChild(btn);

        row.appendChild(td1);
        row.appendChild(td2);
        row.appendChild(td3);
        row.appendChild(td4);

        tbody.appendChild(row);
    });

    document.getElementById("methodUsed").innerText = "Method Used: DOM Methods";
}

function addInnerHTML() {
    const name = document.getElementById("name").value.trim();
    const price = document.getElementById("price").value.trim();
    const category = document.getElementById("category").value.trim();

    if (!name || !price || !category) {
        alert("Complete all fields!");
        return;
    }

    document.getElementById("tableBody").innerHTML += `
    <tr>
        <td>${name}</td>
        <td>${price}</td>
        <td>${category}</td>
        <td><button onclick="this.parentElement.parentElement.remove()">Delete</button></td>
    </tr>`;

    document.getElementById("methodUsed").innerText = "Added using innerHTML";
}

function addDOM() {
    const name = document.getElementById("name").value.trim();
    const price = document.getElementById("price").value.trim();
    const category = document.getElementById("category").value.trim();

    if (!name || !price || !category) {
        alert("Complete all fields!");
        return;
    }

    const tbody = document.getElementById("tableBody");

    const row = document.createElement("tr");

    const td1 = document.createElement("td");
    const td2 = document.createElement("td");
    const td3 = document.createElement("td");
    const td4 = document.createElement("td");

    td1.textContent = name;
    td2.textContent = price;
    td3.textContent = category;

    const btn = document.createElement("button");
    btn.textContent = "Delete";
    btn.onclick = () => row.remove();

    td4.appendChild(btn);

    row.appendChild(td1);
    row.appendChild(td2);
    row.appendChild(td3);
    row.appendChild(td4);

    tbody.appendChild(row);

    document.getElementById("methodUsed").innerText = "Added using DOM";
}


function testPerformance() {

    console.time("innerHTML");
    let tbody = document.getElementById("tableBody");
    let rows = "";

    for (let i = 1; i <= 100; i++) {
        let p = generateProduct(i);

        rows += `
        <tr>
            <td>${p.name}</td>
            <td>${p.price}</td>
            <td>${p.category}</td>
            <td><button>Delete</button></td>
        </tr>`;
    }

    tbody.innerHTML = rows;
    console.timeEnd("innerHTML");


    console.time("DOM");
    tbody.innerHTML = "";

    for (let i = 1; i <= 100; i++) {
        let p = generateProduct(i);

        const row = document.createElement("tr");

        const td1 = document.createElement("td");
        const td2 = document.createElement("td");
        const td3 = document.createElement("td");
        const td4 = document.createElement("td");

        td1.textContent = p.name;
        td2.textContent = p.price;
        td3.textContent = p.category;

        const btn = document.createElement("button");
        btn.textContent = "Delete";
        btn.onclick = () => row.remove();

        td4.appendChild(btn);

        row.appendChild(td1);
        row.appendChild(td2);
        row.appendChild(td3);
        row.appendChild(td4);

        tbody.appendChild(row);
    }

    console.timeEnd("DOM");
}

function clearTable() {
    document.getElementById("tableBody").innerHTML = "";
}

</script>

</body>
</html>
