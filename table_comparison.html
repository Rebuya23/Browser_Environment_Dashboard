<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Product Table Comparison</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(to right, #81db7e, #1cdae0);
    color: #333;
    margin: 0;
    padding: 0;
}.container {
    width: 80%;
    margin: 50px auto;
    background: white;
    padding: 30px;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    text-align: center;
} h1 {
    margin-bottom: 20px;
} .buttons {
    margin-bottom: 20px;
} button {
    padding: 10px 15px;
    margin: 5px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    background: #0bf503;
    color: white;
    font-weight: bold;
    transition: 0.3s;
} button:hover {
    background: #5a67d8;
    transform: scale(1.05);
} table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 20px;
} th, td {
    padding: 12px;
    border: 1px solid #ddd;
} th {
    background: #0bf503;
    color: white;
} tr:nth-child(even) {
    background: #f2f2f2;
} #methodUsed {
    margin-top: 15px;
    font-weight: bold;
    color: #555;
}
</style>

</head>

<body>

<div class="container">
    <h1>🛒 Product Table Comparison</h1>

    <div class="buttons">
        <button onclick="loadInnerHTML()">Load using innerHTML</button>
        <button onclick="loadDOM()">Load using DOM Methods</button>
        <button onclick="clearTable()">Clear Table</button>
    </div>

    <table id="productTable">
        <thead>
            <tr>
                <th>Product Name</th>
                <th>Price</th>
                <th>Category</th>
            </tr>
        </thead>
        <tbody>
        </tbody>
    </table>

    <p id="methodUsed"></p>
</div>

<script>
const products = [
    { name: "T-shirts", price: 299, category: "Clothing" },
    { name: "Shorts", price: 249, category: "Clothing" },
    { name: "Caps", price: 150, category: "Clothing" },
    { name: "Socks", price: 50, category: "Clothing" },
    { name: "Hoodie Jackets", price: 350, category: "Clothing" }
];

// INNER HTML METHOD
function loadInnerHTML() {
    const tbody = document.querySelector("#productTable tbody");
    let rows = "";

    products.forEach(product => {
        rows += `
            <tr>
                <td>${product.name}</td>
                <td>${product.price}</td>
                <td>${product.category}</td>
            </tr>
        `;
    });

    tbody.innerHTML = rows;
    document.getElementById("methodUsed").innerText = "Method Used: innerHTML";
}

// DOM METHODS
function loadDOM() {
    const tbody = document.querySelector("#productTable tbody");
    tbody.innerHTML = "";

    products.forEach(product => {
        let row = document.createElement("tr");

        let name = document.createElement("td");
        name.textContent = product.name;

        let price = document.createElement("td");
        price.textContent = product.price;

        let category = document.createElement("td");
        category.textContent = product.category;

        row.appendChild(name);
        row.appendChild(price);
        row.appendChild(category);

        tbody.appendChild(row);
    });

    document.getElementById("methodUsed").innerText = "Method Used: DOM Methods";
}

// CLEAR TABLE
function clearTable() {
    document.querySelector("#productTable tbody").innerHTML = "";
    document.getElementById("methodUsed").innerText = "";
}
</script>

</body>
</html>
