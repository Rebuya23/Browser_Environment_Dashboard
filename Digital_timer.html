<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Timer App</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #1e293b, #0f172a);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    color: #e5e7eb;
}

.container {
    background: #1f2937;
    padding: 30px;
    border-radius: 15px;
    text-align: center;
    box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    width: 320px;
}

h1 {
    margin-bottom: 20px;
    font-size: 22px;
}

#timer {
    font-size: 42px;
    font-weight: bold;
    margin: 20px 0;
    letter-spacing: 2px;
}

#status {
    font-size: 16px;
    margin-bottom: 20px;
    color: #9ca3af;
}

.buttons button {
    padding: 10px 15px;
    margin: 5px;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    cursor: pointer;
    transition: 0.3s;
}

#startBtn {
    background-color: #22c55e;
    color: white;
}

#pauseBtn {
    background-color: #f59e0b;
    color: white;
}

#resetBtn {
    background-color: #ef4444;
    color: white;
}

.buttons button:hover {
    transform: scale(1.05);
    opacity: 0.9;
}

#startBtn:hover {
    background-color: #16a34a;
}

#pauseBtn:hover {
    background-color: #d97706;
}

#resetBtn:hover {
    background-color: #dc2626;
}

@media (max-width: 600px) {
    body {
        align-items: flex-end;
        padding: 15px;
    }

    .container {
        width: 100%;
        border-radius: 20px;
    }

    #timer {
        font-size: 36px;
    }

    .buttons {
        display: flex;
        gap: 10px;
    }

    .buttons button {
        flex: 1;
        font-size: 15px;
    }
}
</style>
</head>

<body>

<div class="container">
    <h1>⏱ Digital Timer</h1>

    <div id="timer">00:00:00</div>

    <p id="status">Status: Reset</p>

    <div class="buttons">
        <button id="startBtn">Start</button>
        <button id="pauseBtn">Pause</button>
        <button id="resetBtn">Reset</button>
    </div>
</div>

<script>
let timer;
let seconds = 0;
let isRunning = false;

const timerDisplay = document.getElementById("timer");
const statusDisplay = document.getElementById("status");
const startBtn = document.getElementById("startBtn");
const pauseBtn = document.getElementById("pauseBtn");
const resetBtn = document.getElementById("resetBtn");

const startSound = new Audio("https://www.soundjay.com/buttons/sounds/button-09.mp3");
const pauseSound = new Audio("https://www.soundjay.com/buttons/sounds/button-10.mp3");
const resetSound = new Audio("https://www.soundjay.com/buttons/sounds/button-11.mp3");

function playSound(sound) {
    sound.currentTime = 0;
    sound.play().catch(function(){});
}

function formatTime(sec) {
    let hrs = Math.floor(sec / 3600);
    let mins = Math.floor((sec % 3600) / 60);
    let secs = sec % 60;

    return (
        String(hrs).padStart(2, '0') + ":" +
        String(mins).padStart(2, '0') + ":" +
        String(secs).padStart(2, '0')
    );
}

function updateDisplay() {
    timerDisplay.textContent = formatTime(seconds);
}

startBtn.addEventListener("click", function () {
    if (!isRunning) {
        timer = setInterval(function () {
            seconds++;
            updateDisplay();
        }, 1000);

        isRunning = true;
        statusDisplay.textContent = "Status: Running";

        playSound(startSound);
    }
});

pauseBtn.addEventListener("click", function () {
    clearInterval(timer);
    isRunning = false;
    statusDisplay.textContent = "Status: Paused";

    playSound(pauseSound);
});

resetBtn.addEventListener("click", function () {
    clearInterval(timer);
    seconds = 0;
    updateDisplay();
    isRunning = false;
    statusDisplay.textContent = "Status: Reset";

    playSound(resetSound);
});

document.addEventListener("keydown", function (event) {
    if (event.key.toLowerCase() === 's') startBtn.click();
    if (event.key.toLowerCase() === 'p') pauseBtn.click();
    if (event.key.toLowerCase() === 'r') resetBtn.click();
});
</script>

</body>
</html>
