<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Product Table Comparison</title>

<style>
body {
    font-family: Arial;
    background: linear-gradient(to right, #111827, #1E293B);
}

.container {
    width: 80%;
    margin: 40px auto;
    background: white;
    padding: 20px;
    border-radius: 10px;
    text-align: center;
}

input {
    padding: 8px;
    margin: 5px;
}

button {
    padding: 8px 12px;
    margin: 5px;
    background: #22d3ee;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}
button:hover {
    background: #06B6D4;
    transform: scale(1.05);
}
table {
    width: 100%;
    margin-top: 20px;
    border-collapse: collapse;
}

th, td {
    border: 1px solid #ddd;
    padding: 10px;
}

th {
    background: #020617;
    color: white;
}
</style>
</head>

<body>

<div class="container">

<h2>🛒 Product Table Comparison</h2>

<input type="text" id="name" placeholder="Product Name">
<input type="number" id="price" placeholder="Price">
<input type="text" id="category" placeholder="Category">

<br>

<button onclick="addInnerHTML()">Add (innerHTML)</button>
<button onclick="addDOM()">Add (DOM)</button>

<br><br>

<button onclick="loadSampleInnerHTML()">Load Sample (innerHTML)</button>
<button onclick="loadSampleDOM()">Load Sample (DOM)</button>

<br><br>

<button onclick="testInnerHTML()">Test innerHTML</button>
<button onclick="testDOM()">Test DOM</button>

<button onclick="clearTable()">Clear</button>

<p id="methodUsed"></p>

<table>
<thead>
<tr>
<th>Name</th>
<th>Price</th>
<th>Category</th>
<th>Action</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>

</div>

<script>

const sampleProducts = [
    { name: "T-shirt", price: 299, category: "Clothing" },
    { name: "Shorts", price: 249, category: "Clothing" },
    { name: "Cap", price: 150, category: "Clothing" },
    { name: "Socks", price: 50, category: "Clothing" },
    { name: "Hoodie Jacket", price: 350, category: "Clothing" }
];

function generateManyProducts(count) {
    let products = [];
    for (let i = 1; i <= count; i++) {
        products.push({
            name: "Product " + i,
            price: Math.floor(Math.random() * 100),
            category: "Category " + (i % 5 + 1)
        });
    }
    return products;
}

function loadSampleInnerHTML() {
    let rows = "";

    sampleProducts.forEach(p => {
        rows += `
        <tr>
            <td>${p.name}</td>
            <td>${p.price}</td>
            <td>${p.category}</td>
            <td><button onclick="this.parentElement.parentElement.remove()">Delete</button></td>
        </tr>`;
    });

    document.getElementById("tableBody").innerHTML = rows;
}

function loadSampleDOM() {
    let tbody = document.getElementById("tableBody");
    tbody.innerHTML = "";

    sampleProducts.forEach(p => {

        let row = document.createElement("tr");

        let td1 = document.createElement("td");
        td1.textContent = p.name;

        let td2 = document.createElement("td");
        td2.textContent = p.price;

        let td3 = document.createElement("td");
        td3.textContent = p.category;

        let td4 = document.createElement("td");

        let btn = document.createElement("button");
        btn.textContent = "Delete";
        btn.onclick = () => row.remove();

        td4.appendChild(btn);

        row.appendChild(td1);
        row.appendChild(td2);
        row.appendChild(td3);
        row.appendChild(td4);

        tbody.appendChild(row);
    });
}

function addInnerHTML() {
    let name = document.getElementById("name").value.trim();
    let price = document.getElementById("price").value.trim();
    let category = document.getElementById("category").value.trim();

    if (!name || !price || !category) {
        alert("Please fill all fields!");
        return;
    }

    document.getElementById("tableBody").innerHTML += `
    <tr>
        <td>${name}</td>
        <td>${price}</td>
        <td>${category}</td>
        <td><button onclick="this.parentElement.parentElement.remove()">Delete</button></td>
    </tr>`;
}

function addDOM() {
    let name = document.getElementById("name").value.trim();
    let price = document.getElementById("price").value.trim();
    let category = document.getElementById("category").value.trim();

    if (!name || !price || !category) {
        alert("Please fill all fields!");
        return;
    }

    let tbody = document.getElementById("tableBody");

    let row = document.createElement("tr");

    let td1 = document.createElement("td");
    td1.textContent = name;

    let td2 = document.createElement("td");
    td2.textContent = price;

    let td3 = document.createElement("td");
    td3.textContent = category;

    let td4 = document.createElement("td");

    let btn = document.createElement("button");
    btn.textContent = "Delete";
    btn.onclick = () => row.remove();

    td4.appendChild(btn);

    row.appendChild(td1);
    row.appendChild(td2);
    row.appendChild(td3);
    row.appendChild(td4);

    tbody.appendChild(row);
}

function testInnerHTML() {

    let products = generateManyProducts(100);

    console.time("innerHTML");

    let rows = "";
    products.forEach(p => {
        rows += `
        <tr>
            <td>${p.name}</td>
            <td>${p.price}</td>
            <td>${p.category}</td>
            <td><button>Delete</button></td>
        </tr>`;
    });

    document.getElementById("tableBody").innerHTML = rows;

    console.timeEnd("innerHTML");
}

function testDOM() {

    let products = generateManyProducts(100);

    console.time("DOM");

    let tbody = document.getElementById("tableBody");
    tbody.innerHTML = "";

    products.forEach(p => {

        let row = document.createElement("tr");

        let td1 = document.createElement("td");
        td1.textContent = p.name;

        let td2 = document.createElement("td");
        td2.textContent = p.price;

        let td3 = document.createElement("td");
        td3.textContent = p.category;

        let td4 = document.createElement("td");

        let btn = document.createElement("button");
        btn.textContent = "Delete";
        btn.onclick = () => row.remove();

        td4.appendChild(btn);

        row.appendChild(td1);
        row.appendChild(td2);
        row.appendChild(td3);
        row.appendChild(td4);

        tbody.appendChild(row);
    });

    console.timeEnd("DOM");
}

function clearTable() {
    document.getElementById("tableBody").innerHTML = "";
}

</script>

</body>
</html>
